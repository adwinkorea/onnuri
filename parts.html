<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부품도면 · 온누리 드론 지식센터</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>
<div class="page-head"><div class="wrap">
  <div class="crumb"><a href="index.html">홈</a> › 부품도면</div>
  <h1>📐 부품도면</h1><p>기체별 분해도와 부품 번호를 조회할 수 있습니다.</p>
</div></div>
<section class="block"><div class="wrap">
  <div class="manual-grid" id="partGrid"></div>
</div></section>
<div id="site-footer"></div>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
  mountChrome();
  bootContent(function(){

  document.getElementById("partGrid").innerHTML = DATA.models.map(m=>`
    <div class="manual">
      <div class="file-ic" style="background:linear-gradient(135deg,#4dabf7,#1971c2)">도면</div>
      <div>
        <h4>${m.name}</h4>
        <p>분해도 · 부품 번호표</p>
        <div class="dl"><button class="btn btn-blue" disabled style="opacity:.5;cursor:not-allowed">준비중</button></div>
      </div>
    </div>`).join("");

  });
</script>
</body>
</html>
