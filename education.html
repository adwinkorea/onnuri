<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교육영상 · 온누리 드론 지식센터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="site-header"></div>
<div class="page-head">
  <div class="wrap">
    <div class="crumb"><a href="index.html">홈</a> › 교육영상</div>
    <h1>🎬 교육영상</h1>
    <p>국가자격증 취득부터 농업용 방제 실무까지 단계별 영상으로 배워보세요.</p>
  </div>
</div>
<section class="block">
  <div class="wrap">
    <div id="player" style="max-width:760px;margin:0 auto 36px;display:none">
      <div class="video-frame" id="videoFrame"></div>
      <div class="video-fallback" id="videoFallback"></div>
      <h3 id="videoTitle" style="text-align:center"></h3>
    </div>
    <div class="edu-grid" id="eduGrid"></div>
  </div>
</section>
<div id="site-footer"></div>
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
  mountChrome("edu");
  bootContent(function(){

  const grid=document.getElementById("eduGrid");
  const player=document.getElementById("player");
  const frame=document.getElementById("videoFrame");
  const vtitle=document.getElementById("videoTitle");

  function ytId(v){
    if(!v) return "";
    const m = v.match(/(?:v=|youtu\.be\/|embed\/)([\w-]{11})/);
    return m ? m[1] : (v.length===11 ? v : "");
  }

  grid.innerHTML = DATA.educations.map((e,i)=>`
    <div class="edu" style="background:${e.color}" data-i="${i}">
      <span class="lab"><span class="em">${e.emoji}</span>${e.title}</span>
      <span>▶</span>
    </div>`).join("");

  grid.querySelectorAll(".edu").forEach(el=>{
    el.addEventListener("click",()=>{
      const e=DATA.educations[el.dataset.i];
      const id=ytId(e.youtube);
      vtitle.textContent=e.title;
      const fallback=document.getElementById("videoFallback");
      if(id){
        const origin = encodeURIComponent(location.origin);
        const src = `https://www.youtube-nocookie.com/embed/${id}?rel=0&playsinline=1&origin=${origin}`;
        frame.innerHTML =
          `<iframe src="${src}" title="${e.title}" loading="lazy" frameborder="0"
             allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
             referrerpolicy="strict-origin-when-cross-origin"
             allowfullscreen></iframe>`;
        fallback.innerHTML =
          `영상이 재생되지 않나요? <a href="https://youtu.be/${id}" target="_blank" rel="noopener">유튜브에서 바로 보기 ↗</a>`;
        fallback.style.display="block";
      } else {
        frame.innerHTML = `<div>🎬 영상 준비중입니다</div>`;
        fallback.style.display="none";
      }
      player.style.display="block";
      player.scrollIntoView({behavior:"smooth",block:"center"});
    });
  });

  });
</script>
</body>
</html>
