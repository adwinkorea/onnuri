<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A/S 접수 · 온누리 드론 지식센터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>.as-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:50px;align-items:start}</style>
</head>
<body>
<div id="site-header"></div>
<div class="page-head">
  <div class="wrap">
    <div class="crumb"><a href="index.html">홈</a> › A/S 접수</div>
    <h1>🛠️ A/S 접수</h1>
    <p>증상과 사진을 남겨주시면 담당자가 빠르게 연락드립니다.</p>
  </div>
</div>
<section class="block">
  <div class="wrap as-grid">
    <div>
      <div class="info-card"><div class="ic">📞</div><div><h4>전화 접수</h4><p id="asPhone"></p></div></div>
      <div class="info-card"><div class="ic">⏱️</div><div><h4>빠른 처리</h4><p>접수 후 영업일 기준 1일 내 연락</p></div></div>
      <div class="info-card"><div class="ic">🚚</div><div><h4>방문/택배 수리</h4><p>증상에 따라 출장 또는 입고 수리 안내</p></div></div>
      <div class="info-card"><div class="ic">🤖</div><div><h4>AI 챗봇 상담</h4><p>간단한 문제는 챗봇으로 즉시 해결</p></div></div>
    </div>
    <div class="form-card">
      <div class="field"><label>이름</label><input id="nm" type="text" placeholder="이름을 입력하세요"></div>
      <div class="row2">
        <div class="field"><label>연락처</label><input id="ph" type="tel" placeholder="010-0000-0000"></div>
        <div class="field"><label>기체 종류</label><select id="md"></select></div>
      </div>
      <div class="field"><label>증상</label><textarea id="sym" placeholder="발생한 증상을 자세히 입력해 주세요"></textarea></div>
      <div class="field"><label>첨부파일 <span style="font-weight:400;color:var(--muted);font-size:13px">(이미지, 압축파일 등 · 선택)</span></label>
        <input id="fileInput" type="file" multiple
               accept="image/*,.zip,.rar,.7z,.pdf"
               style="display:none">
        <button type="button" class="attach-btn" id="attachBtn">📎 파일 첨부하기</button>
        <div class="attach-list" id="attachList"></div>
      </div>
      <button class="btn btn-blue submit" id="submitBtn">접수하기</button>
    </div>
  </div>
</section>
<div id="site-footer"></div>
<script src="js/data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
  mountChrome("as");
  bootContent(function(){
    document.getElementById("asPhone").textContent = DATA.site.phone + " · " + DATA.site.hours;
    document.getElementById("md").innerHTML = DATA.models.map(m=>`<option>${m.name}</option>`).join("");
  });

  /* ── 파일 첨부 (선택·표시만, 실제 업로드는 서버 연동 시 추가) ── */
  const fileInput = document.getElementById("fileInput");
  const attachBtn = document.getElementById("attachBtn");
  const attachList = document.getElementById("attachList");
  let pickedFiles = [];
  attachBtn.addEventListener("click", ()=> fileInput.click());
  fileInput.addEventListener("change", ()=>{
    // 새로 고른 파일을 누적 (중복 이름은 무시)
    for(const f of fileInput.files){
      if(!pickedFiles.some(x=>x.name===f.name && x.size===f.size)) pickedFiles.push(f);
    }
    fileInput.value = ""; // 같은 파일 다시 고를 수 있게 초기화
    renderAttach();
  });
  function fmtSize(b){ return b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB"; }
  function renderAttach(){
    if(!pickedFiles.length){ attachList.innerHTML=""; return; }
    attachList.innerHTML = pickedFiles.map((f,i)=>`
      <div class="attach-item">
        <span class="af-ic">${/^image\//.test(f.type)?"🖼️":"📦"}</span>
        <span class="af-name">${f.name}</span>
        <span class="af-size">${fmtSize(f.size)}</span>
        <button type="button" class="af-del" data-i="${i}" aria-label="삭제">✕</button>
      </div>`).join("");
    attachList.querySelectorAll(".af-del").forEach(btn=>{
      btn.addEventListener("click", ()=>{ pickedFiles.splice(+btn.dataset.i,1); renderAttach(); });
    });
  }

  const btn = document.getElementById("submitBtn");
  btn.addEventListener("click", async ()=>{
    const name=document.getElementById("nm").value.trim();
    const phone=document.getElementById("ph").value.trim();
    const model=document.getElementById("md").value;
    const symptom=document.getElementById("sym").value.trim();
    if(!name||!phone){ alert("이름과 연락처를 입력해 주세요."); return; }

    btn.disabled=true; const prev=btn.textContent; btn.textContent="접수 중...";
    // 첨부 파일명만 함께 전달 (실제 업로드는 서버/스토리지 연동 시 구현)
    const attachments = pickedFiles.map(f=>f.name);
    const r = await submitAS({ name, phone, model, symptom, attachments });
    btn.disabled=false; btn.textContent=prev;

    if(r.ok){
      if(r.server){
        alert("접수가 완료되었습니다." + (r.emailed?" 담당자에게 알림 메일이 발송되었습니다." : "") + "\n영업일 기준 1일 내 연락드리겠습니다.");
      }else{
        alert("접수가 저장되었습니다.\n(현재 서버 미연동 상태 — 배포 후 자동으로 서버로 전송됩니다.)");
      }
      document.getElementById("nm").value="";
      document.getElementById("ph").value="";
      document.getElementById("sym").value="";
      pickedFiles = []; renderAttach();
    }else{
      alert("접수에 실패했습니다: " + (r.error||"잠시 후 다시 시도해 주세요."));
    }
  });
</script>
</body>
</html>
